{% extends "base.html" %}

{% block main %}
<h1 class="h3 my-4">Properties</h1>
<div class="row g-4">
  {% for property in properties %}
    <div class="col-md-4">
      <div class="card h-100 shadow-sm property-card">
        <img src="{{ url_for('static', filename='uploads/' ~ property.photo) }}" class="card-img-top property-image" alt="{{ property.title }}">
        <div class="card-body">
          <h5 class="card-title">{{ property.title }}</h5>
          <p class="card-text mb-1">{{ property.location }}</p>
          <p class="card-text fw-bold text-primary">${{ "{:,.2f}".format(property.price) }}</p>
          <a href="{{ url_for('property_detail', propertyid=property.id) }}" class="btn btn-outline-primary">View Details</a>
        </div>
      </div>
    </div>
  {% else %}
    <p>No properties have been added yet.</p>
  {% endfor %}
</div>
{% endblock %}
