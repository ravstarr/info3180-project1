{% extends "base.html" %}

{% block main %}
<div class="row my-4">
  <div class="col-md-8 mx-auto">
    <div class="card shadow-sm">
      <img src="{{ url_for('static', filename='uploads/' ~ property.photo) }}" class="card-img-top property-image-lg" alt="{{ property.title }}">
      <div class="card-body">
        <h1 class="h3">{{ property.title }}</h1>
        <p class="text-muted">{{ property.location }}</p>
        <p class="fw-bold text-primary">${{ "{:,.2f}".format(property.price) }}</p>
        <p><strong>Type:</strong> {{ property.type }}</p>
        <p><strong>Bedrooms:</strong> {{ property.bedrooms }}</p>
        <p><strong>Bathrooms:</strong> {{ property.bathrooms }}</p>
        <p class="mt-3">{{ property.description }}</p>
        <a href="#" class="btn btn-primary mt-2">Email Realtor</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
